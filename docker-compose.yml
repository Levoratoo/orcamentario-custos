version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: printbag
      POSTGRES_PASSWORD: printbag
      POSTGRES_DB: printbag
    ports:
      - '5432:5432'
    volumes:
      - printbag_db:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://printbag:printbag@db:5432/printbag
      JWT_SECRET: dev_access_secret_change_me
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ALLOW_NEGATIVE_VALUES: 'false'
    ports:
      - '3003:3000'

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@printbag.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - db
    profiles:
      - tools

volumes:
  printbag_db:
